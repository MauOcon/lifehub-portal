<div class="syllabus-editor-container">
  <!-- Modo Vista -->
  <table *ngIf="isViewMode" class="syllabus-table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Nombre</th>
        <th scope="col">Avance</th>
        <th scope="col">Fecha de actividad</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of syllabus">
        <td>{{ item.number }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.progress }}%</td>
        <td>{{ item.activityDate ? (item.activityDate | date: 'dd/MM/yyyy') : '-' }}</td>
      </tr>
    </tbody>
  </table>

  <!-- Modo Creación/Edición -->
  <div *ngIf="isEditable" class="syllabus-editor">
    <div class="editor-actions">
      <button class="btn-save" (click)="save()" [disabled]="editableTopics.length === 0">Guardar</button>
      <button class="btn-cancel" (click)="cancel()">Cancelar</button>
      <span class="keyboard-hint">Ctrl+Enter para agregar tema</span>
    </div>

    <table class="syllabus-edit-table">
      <thead>
        <tr>
          <th>Símbolo</th>
          <th>Nombre</th>
          <th>Padre</th>
          <th>Avance (%)</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let topic of editableTopics; let i = index">
          <td>
            <input
              type="text"
              [(ngModel)]="topic.hierarchicalSymbol"
              placeholder="I, II, 1, 2..."
              class="input-symbol"
              (keydown)="handleKeyDown($event, i)"
            />
          </td>
          <td>
            <input
              type="text"
              [(ngModel)]="topic.name"
              placeholder="Nombre del tema"
              class="input-name"
              (keydown)="handleKeyDown($event, i)"
            />
          </td>
          <td>
            <select [(ngModel)]="topic.fatherId" class="select-parent" (keydown)="handleKeyDown($event, i)">
              <option [value]="0">Raíz</option>
              <option *ngFor="let parent of getAvailableParents(topic.topicId)" [value]="parent.topicId">
                {{ parent.hierarchicalSymbol || 'Sin símbolo' }} - {{ parent.name }}
              </option>
            </select>
            <span *ngIf="topic.fatherId !== 0 && getParentSymbol(topic.fatherId)" class="parent-preview">
              ({{ getParentSymbol(topic.fatherId) }})
            </span>
          </td>
          <td>
            <input
              type="number"
              [(ngModel)]="topic.completion"
              min="0"
              max="100"
              placeholder="0"
              class="input-completion"
              (keydown)="handleKeyDown($event, i)"
            />
          </td>
          <td>
            <button class="btn-remove" (click)="removeTopic(i)">Eliminar</button>
          </td>
        </tr>
        <tr class="add-row">
          <td colspan="5">
            <button class="btn-add-row" (click)="addTopic()">
              + Agregar nuevo tema
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
